<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 3. Componente Visual con JS</title>
    <link rel="stylesheet" href="css/componente.css">
</head>
<body>
    <div class="contenedor">
        <h1>Componente Visual con JS</h1>
        <p>
            Ejemplo de un componente reutilizable para mostrar
            notificaciones en una página web.
        </p>

        <button onclick="mostrarToast('Operación realizada correctamente','success')">
            Toast Éxito
        </button>

        <button onclick="mostrarToast('Ocurrió un error','error')">
            Toast Error
        </button>

        <button onclick="mostrarToast('Revisa la información','warning')">
            Toast Advertencia
        </button>

        <button onclick="mostrarToast('Bienvenido al sistema','info')">
            Toast Información
        </button>
    </div>
    <script src="js/componente.js"></script>
</body>
</html>
